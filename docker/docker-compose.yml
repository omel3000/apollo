services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apollo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apollo123}
      POSTGRES_DB: ${POSTGRES_DB:-apollo_test_db}
    # Nie wystawiamy portu Postgresa na host (bezpieczeństwo).
    volumes:
      - postgres_data:/var/lib/postgresql/data
    dns:
      - 127.0.0.11
    networks:
      - apollo-network

  postgres-backup:
    build: ./backup
    container_name: postgres-backup
    restart: always
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-apollo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-apollo123}
      - POSTGRES_DB=${POSTGRES_DB:-apollo_test_db}
      - BACKUP_CRON=${BACKUP_CRON:-0 3 * * *}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-32}
      - BACKUP_RUN_ON_STARTUP=${BACKUP_RUN_ON_STARTUP:-false}
      - TZ=${TZ:-Europe/Warsaw}
    volumes:
      - ../backup_psql:/backups
    depends_on:
      - postgres-db
    dns:
      - 127.0.0.11
    networks:
      - apollo-network

  backend:
    build: ./backend
    container_name: backend
    restart: always
    working_dir: /app
    # Development override - włącz hot-reload
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app
    # Port 8000 USUNIĘTY - backend dostępny tylko przez Nginx w sieci Docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-apollo}:${POSTGRES_PASSWORD:-apollo123}@postgres-db:5432/${POSTGRES_DB:-apollo_test_db}
      - SECRET_KEY=${SECRET_KEY:-supersekretnykluczdojwt}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - ENABLE_DOCS=${ENABLE_DOCS:-true}
      - INITIAL_ADMIN_ENABLED=${INITIAL_ADMIN_ENABLED:-false}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}
      - INITIAL_ADMIN_FIRST_NAME=${INITIAL_ADMIN_FIRST_NAME:-}
      - INITIAL_ADMIN_LAST_NAME=${INITIAL_ADMIN_LAST_NAME:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8000/integrations/google/callback}
      - GOOGLE_OAUTH_SCOPES=${GOOGLE_OAUTH_SCOPES:-openid,email,profile,https://www.googleapis.com/auth/calendar.events,https://www.googleapis.com/auth/calendar.calendars,https://www.googleapis.com/auth/calendar.calendarlist.readonly}
      - GOOGLE_TOKEN_ENCRYPTION_KEY=${GOOGLE_TOKEN_ENCRYPTION_KEY:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    depends_on:
      - postgres-db
    dns:
      - 127.0.0.11
    networks:
      - apollo-network

  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    dns:
      - 127.0.0.11  # Docker's embedded DNS
    networks:
      - apollo-network

networks:
  apollo-network:
    driver: bridge

volumes:
  postgres_data:
